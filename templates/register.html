<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <script>
    (function(){var t=localStorage.getItem('exam_theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');})();
  </script>
  <meta charset="UTF-8">
  <title>ثبت‌نام - سامانه آزمون</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/ultra.css">
</head>
<body>
<div class="auth-bg-grid"></div>
<div class="auth-glow"></div>
<div class="auth-page">
  <div class="auth-card fade-in" style="max-width:480px;">
    <div class="auth-logo">
      <div class="auth-logo-icon">✨</div>
      <div class="auth-title">ایجاد حساب کاربری</div>
      <div class="auth-subtitle">اطلاعات خود را وارد کنید</div>
    </div>

    {% if error %}
    <div class="alert alert-error">❌ {{ error }}</div>
    {% endif %}

    <form method="post" action="/register">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">نام کاربری</label>
          <input type="text" name="username" class="form-control" placeholder="username" required>
        </div>
        <div class="form-group">
          <label class="form-label">نام و نام خانوادگی</label>
          <input type="text" name="full_name" class="form-control" placeholder="علی احمدی" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">ایمیل</label>
        <input type="email" name="email" class="form-control" placeholder="example@university.ac.ir" required>
      </div>
      <div class="form-group">
        <label class="form-label">رمز عبور</label>
        <input type="password" name="password" class="form-control" placeholder="حداقل ۸ کاراکتر" minlength="8" required>
      </div>
      <div class="form-group">
        <label class="form-label">نقش</label>
        <select name="role" class="form-control" required onchange="document.getElementById('teacher-verify-hint').style.display = (this.value==='teacher') ? 'block' : 'none';">
          <option value="student">دانشجو</option>
          <option value="teacher">استاد</option>
        </select>
        <div class="form-hint">نقش مدیر سیستم توسط ادمین اختصاص می‌یابد</div>
        <div id="teacher-verify-hint" class="alert alert-info" style="display:none; margin-top:10px; font-size:.8rem;">
          ℹ پس از ثبت‌نام به‌عنوان استاد، حساب شما باید توسط مدیر سیستم تایید شود تا بتوانید وارد شوید.
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">ثبت‌نام ←</button>
    </form>

    <div class="divider"></div>
    <div style="text-align:center; font-size:.85rem; color:var(--text-muted);">
      قبلاً ثبت‌نام کرده‌اید؟ <a href="/login">وارد شوید</a>
    </div>
  </div>
</div>
<script src="/static/js/main.js"></script>
<script src="/static/js/ultra.js"></script>
</body>
</html>
