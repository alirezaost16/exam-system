<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <script>
    (function(){var t=localStorage.getItem('exam_theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');})();
  </script>
  <meta charset="UTF-8">
  <title>ورود - سامانه آزمون</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/ultra.css">
</head>
<body>
<div class="auth-bg-grid"></div>
<div class="auth-glow"></div>
<div class="auth-page">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <div class="auth-logo-icon">📋</div>
      <div class="auth-title">ورود به سیستم</div>
      <div class="auth-subtitle">نام کاربری و رمز عبور خود را وارد کنید</div>
    </div>

    {% if error %}
    <div class="alert alert-error">❌ {{ error }}</div>
    {% endif %}
    {% if info %}
    <div class="alert alert-info">ℹ️ {{ info }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="form-group">
        <label class="form-label">نام کاربری</label>
        <input type="text" name="username" class="form-control" placeholder="username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">رمز عبور</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">ورود ←</button>
    </form>

    <div class="divider"></div>

    <div style="text-align:center; font-size:.85rem; color:var(--text-muted);">
      حساب کاربری ندارید؟
      <a href="/register">ثبت‌نام کنید</a>
    </div>

    <div style="margin-top:20px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px; font-size:.75rem; color:var(--text-muted);">
      <div style="font-weight:600; color:var(--text-secondary); margin-bottom:8px;">🔑 اطلاعات پیش‌فرض تست:</div>
      <div>مدیر: <span style="color:var(--accent)">admin / admin123</span></div>
      <div>استاد: <span style="color:var(--accent)">teacher1 / teacher123</span></div>
      <div>دانشجو: <span style="color:var(--accent)">student1 / student123</span></div>
    </div>
  </div>
</div>
<script src="/static/js/main.js"></script>
<script src="/static/js/ultra.js"></script>
</body>
</html>
